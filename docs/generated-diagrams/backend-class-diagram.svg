<text x="1124" y="211" class="body">role, refreshToken</text>
<text x="1124" y="229" class="body">assessment.scores</text>
<text x="1124" y="247" class="body">assessment.predictions</text>
<text x="1124" y="265" class="body">summary, completedAt</text>
  
  
    <rect x="1110" y="370" width="300" height="135" rx="8" fill="#eadfff" stroke="#bcc7d4" stroke-width="1.4"/>
