  <rect width="100%" height="100%" fill="#f6f8fb"/>
  <text x="40" y="44" class="page-title">Backend Class Diagram</text>
  <text x="40" y="68" class="subtitle">Express controllers delegate to services, repositories, Mongoose models, and the Flask AI service.</text>
  
  <text x="70" y="120" class="section">Controllers</text>
  
