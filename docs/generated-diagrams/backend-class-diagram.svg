<text x="1124" y="436" class="body">rating, satisfied</text>
<text x="1124" y="454" class="body">comment</text>
<text x="1124" y="472" class="body">predictions snapshot</text>
  
  
    <rect x="1110" y="555" width="300" height="135" rx="8" fill="#eadfff" stroke="#bcc7d4" stroke-width="1.4"/>
